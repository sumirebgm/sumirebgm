<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM診断 | すみれのBGM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) ※ G-0ZHFKMQRX8をご自身のIDに差し替えてください -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0ZHFKMQRX8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0ZHFKMQRX8');
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #2d1f3d;
  --purple: #7a4faa;
  --mid:    #9b7ec8;
  --lav:    #b89fd4;
  --pale:   #e8e0f0;
  --cream:  #faf8f5;
  --white:  #ffffff;
  --muted:  #7a6a8a;
  --danger: #c0392b;
}
body { font-family:'Shippori Mincho','Hiragino Mincho ProN',serif; background:var(--cream); color:var(--ink); min-height:100vh; }
.screen { display:none; }
.screen.active { display:block; }

/* ===== DIAGNOSIS ===== */
#screen-diag { max-width:700px; margin:0 auto; padding:56px 24px 80px; }
.site-header { text-align:center; margin-bottom:48px; }
.site-eyebrow { font-family:'Cormorant Garamond',serif; font-size:12px; letter-spacing:.28em; color:var(--lav); margin-bottom:10px; }
.site-title { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; color:var(--ink); letter-spacing:.12em; margin-bottom:8px; }
.site-sub { font-size:12px; color:var(--lav); letter-spacing:.16em; }
.divider { display:flex; align-items:center; gap:12px; margin:0 0 36px; }
.divider-line { flex:1; height:.5px; background:var(--pale); }
.divider-diamond { width:6px; height:6px; background:var(--lav); transform:rotate(45deg); flex-shrink:0; }
.cat { margin-bottom:28px; }
.cat-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.cat-name { font-size:12px; font-weight:600; color:var(--ink); letter-spacing:.18em; white-space:nowrap; }
.cat-en { font-family:'Cormorant Garamond',serif; font-size:10px; color:var(--lav); letter-spacing:.2em; text-transform:uppercase; }
.cat-line { flex:1; height:.5px; background:var(--pale); }
.tags { display:flex; flex-wrap:wrap; gap:8px; }
.tag { padding:6px 16px; border:1px solid var(--mid); background:var(--white); color:var(--purple); font-family:'Shippori Mincho',serif; font-size:13px; letter-spacing:.06em; cursor:pointer; transition:all .15s; user-select:none; }
.tag:hover { background:var(--purple); color:var(--white); border-color:var(--purple); }
.tag.sel { background:var(--purple); color:var(--white); border-color:var(--purple); font-weight:600; }
.btn-area { text-align:center; margin:36px 0 0; }
.btn-diagnose { padding:13px 56px; border:1px solid var(--mid); background:var(--mid); color:var(--white); font-family:'Shippori Mincho',serif; font-size:14px; letter-spacing:.22em; cursor:pointer; transition:background .2s,border-color .2s; }
.btn-diagnose:hover { background:var(--ink); border-color:var(--ink); }
#results { margin-top:52px; display:none; }
#results.show { display:block; }
.res-label { font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:.28em; color:var(--lav); text-transform:uppercase; display:flex; align-items:center; gap:12px; }
.res-label::before,.res-label::after { content:''; flex:1; height:.5px; background:var(--pale); }
.no-result { text-align:center; padding:40px; color:var(--muted); font-size:13px; letter-spacing:.08em; line-height:2; }
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-top:20px; }
.card { background:var(--white); border:.5px solid var(--pale); overflow:hidden; transition:box-shadow .2s,transform .2s; }
.card:hover { box-shadow:0 4px 20px rgba(122,79,170,.1); transform:translateY(-2px); }
.card.best { border:2px solid var(--purple); box-shadow:0 0 0 3px rgba(122,79,170,.1); }
.best-badge { display:inline-block; background:var(--purple); color:#fff; font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:.2em; text-transform:uppercase; padding:3px 10px; margin-bottom:6px; }
.card-thumb { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#f0eaf8; }
.card-thumb-ph { width:100%; aspect-ratio:1; background:#f0eaf8; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:36px; color:var(--lav); }
.card-body { padding:14px 16px 16px; }
.card-match { font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:.2em; color:var(--mid); text-transform:uppercase; margin-bottom:4px; }
.card-name { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:8px; line-height:1.5; }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
.card-tag { font-size:10px; padding:2px 7px; border:.5px solid var(--pale); color:var(--muted); }
.card-tag.matched { border-color:var(--mid); color:var(--purple); background:#f5f0fb; }
.booth-link { display:block; width:100%; padding:8px; border:1px solid var(--mid); color:var(--purple); font-family:'Shippori Mincho',serif; font-size:12px; letter-spacing:.12em; text-align:center; background:var(--white); cursor:pointer; text-decoration:none; transition:all .15s; }
.booth-link:hover { background:var(--purple); color:var(--white); border-color:var(--purple); }
.share-wrap { text-align:center; margin-top:32px; }
.btn-share { display:inline-flex; align-items:center; gap:8px; padding:11px 32px; border:1px solid #1d9bf0; background:#1d9bf0; color:#fff; font-family:'Shippori Mincho',serif; font-size:13px; letter-spacing:.16em; cursor:pointer; text-decoration:none; transition:background .2s; }
.btn-share:hover { background:#0d8ae0; border-color:#0d8ae0; }
.admin-link-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:72px; }
.admin-link { font-family:'Cormorant Garamond',serif; font-size:8px; letter-spacing:.18em; color:var(--cream); cursor:pointer; text-decoration:none; display:block; padding:2px; }
.x-link { display:flex; align-items:center; justify-content:center; width:32px; height:32px; color:var(--lav); transition:color .15s; text-decoration:none; }
.x-link:hover { color:var(--purple); }

</style>
</head>
<body>

<!-- DIAGNOSIS -->
<div id="screen-diag" class="screen active">
  <div class="site-header">
    <p class="site-eyebrow">✦ すみれのBGM ✦</p>
    <h1 class="site-title">BGM 診 断</h1>
    <p class="site-sub">あなたの配信にぴったりの音を探します</p>
  <p style="font-size:11px;color:var(--lav);letter-spacing:.1em;margin-top:4px">気になるものだけ選んでください</p>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
  <div class="cat">
    <div class="cat-head"><span class="cat-name">雰囲気</span><span class="cat-en">Mood</span><div class="cat-line"></div></div>
    <div class="tags" id="tags-mood"></div>
  </div>
  <div class="cat">
    <div class="cat-head"><span class="cat-name">シーン</span><span class="cat-en">Scene</span><div class="cat-line"></div></div>
    <div class="tags" id="tags-scene"></div>
  </div>
  <div class="cat">
    <div class="cat-head"><span class="cat-name">音・楽器</span><span class="cat-en">Sound</span><div class="cat-line"></div></div>
    <div class="tags" id="tags-sound"></div>
  </div>
  <div class="btn-area">
    <button class="btn-diagnose" onclick="diagnose()">診断する</button>
  </div>
  <div id="results">
    <div class="res-label">おすすめ曲</div>
    <div class="cards" id="result-cards"></div>
    <div class="no-result" id="no-result" style="display:none"></div>
    <div class="share-wrap" id="share-wrap" style="display:none">
      <a class="btn-share" id="share-btn" href="#" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.261 5.638 5.903-5.638zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xでシェアする
      </a>
    </div>
  </div>
  <div class="admin-link-wrap">
  <a class="x-link" href="https://x.com/sumirebgm" target="_blank" rel="noopener" aria-label="X">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.261 5.638 5.903-5.638zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </a>
</div>
</div>










<script>
const DEFAULT_TAGS = {"mood":["チル","かわいい","おしゃれ","まったり","ゆるい","エモい","元気","切ない","クール","しっとり","怪しい","和風"],"scene":["作業配信","朝配信","雑談","おやすみ","配信OP","配信ED","イベント","雨"],"sound":["ピアノ","エレピ","リコーダー","オルゴール","鉄琴","木琴","アコギ","ウクレレ","ぴこぴこ","猫"]};

let workSongs = [];
let workTags  = JSON.parse(JSON.stringify(DEFAULT_TAGS));

// songs.jsonを読み込む
async function loadData() {
  try {
    const res = await fetch('songs.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      workSongs = data.songs || [];
      workTags  = data.tags  || JSON.parse(JSON.stringify(DEFAULT_TAGS));
    }
  } catch(e) {}
  renderDiagTags();
}

// ===== NAVIGATION =====
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
// ===== LOGIN =====
// ===== DIAGNOSIS =====
let selectedTags = new Set();

function renderDiagTags() {
  ['mood','scene','sound'].forEach(cat => {
    const wrap = document.getElementById('tags-' + cat);
    wrap.innerHTML = '';
    (workTags[cat] || []).forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tag' + (selectedTags.has(t) ? ' sel' : '');
      btn.textContent = t;
      btn.onclick = () => {
        if (selectedTags.has(t)) selectedTags.delete(t);
        else selectedTags.add(t);
        btn.classList.toggle('sel');
      };
      wrap.appendChild(btn);
    });
  });
}

function diagnose() {
  const sel = [...selectedTags];
  const res = document.getElementById('results');
  const cardsWrap = document.getElementById('result-cards');
  const noRes = document.getElementById('no-result');

  res.style.display = 'block';

  if (sel.length === 0) {
    cardsWrap.innerHTML = '';
    noRes.style.display = 'block';
    noRes.textContent = 'タグをひとつ以上選んでください。';
    document.getElementById('share-wrap').style.display = 'none';
    res.scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }

  const scored = workSongs.map(s => {
    const matched = sel.filter(t => (s.tags||[]).includes(t));
    return { ...s, matched, score: matched.length };
  }).filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0, 6);

  if (scored.length === 0) {
    cardsWrap.innerHTML = '';
    noRes.style.display = 'block';
    noRes.textContent = '条件に合う曲が見つかりませんでした。タグを変えて試してみてください。';
    document.getElementById('share-wrap').style.display = 'none';
  } else {
    noRes.style.display = 'none';
    cardsWrap.innerHTML = scored.map((s, idx) => `
      <div class="card${idx===0?' best':''}">
        ${s.img
          ? `<img class="card-thumb" src="${esc(s.img)}" alt="${esc(s.name)}" onerror="this.outerHTML='<div class=card-thumb-ph>♪</div>'">`
          : `<div class="card-thumb-ph">♪</div>`}
        <div class="card-body">
          ${idx===0 ? '<span class="best-badge">Best Match</span>' : ''}
          <p class="card-match">一致 ${s.score}タグ</p>
          <p class="card-name">${esc(s.name)}</p>
          <div class="card-tags">
            ${(s.tags||[]).map(t=>`<span class="card-tag${s.matched.includes(t)?' matched':''}">${esc(t)}</span>`).join('')}
          </div>
          <a class="booth-link" href="${esc(s.url)}" target="_blank" rel="noopener"
            onclick="if(typeof gtag!=='undefined')gtag('event','booth_click',{event_category:'BOOTHリンク',event_label:'${esc(s.name)}'})">BOOTHで見る →</a>
        </div>
      </div>
    `).join('');

    const shareWrap = document.getElementById('share-wrap');
    const shareBtn  = document.getElementById('share-btn');
    const tweet = `🎵 すみれのBGM診断やってみた
「${scored[0].name}」がおすすめでした☁️

#すみれのBGM診断`;
    shareBtn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweet)}&url=${encodeURIComponent('https://sumirebgm.github.io/sumirebgm')}`;
    shareWrap.style.display = 'block';
  }

  res.scrollIntoView({ behavior:'smooth', block:'start' });

  // Google Analytics イベント送信
  if (typeof gtag !== 'undefined') {
    gtag('event', 'diagnose', {
      event_category: 'BGM診断',
      event_label: sel.join('・'),
      value: scored.length
    });
  }
}

// ===== UTIL =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
loadData();
</script>
</body>
</html>
