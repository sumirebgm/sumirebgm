<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業時間タイマー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#9b7ec8;--pd:#7a4faa;--pl:#d4c4e8;--lv:#ede8f7;--lvm:#cdc2e8;--r:#c0392b;--cream:#faf8f5}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--cream);color:var(--color-text-primary,#2d1f3d);min-height:100vh;padding:20px 16px 60px}
.wrap{max-width:560px;margin:0 auto}
.mtabs{display:flex;gap:4px;margin-bottom:16px}
.mt{flex:1;padding:9px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--p);font-family:inherit;font-size:13px;cursor:pointer;text-align:center;border-radius:8px;transition:all .15s}
.mt.on{background:var(--p);color:#fff;border-color:var(--p)}
.prow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ptabs{display:flex;gap:6px}
.pt{padding:5px 14px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--color-text-secondary,#7a6a8a);font-size:12px;cursor:pointer;border-radius:20px;font-family:inherit;transition:all .15s}
.pt.on{background:var(--p);color:#fff;border-color:var(--p)}
.dlbl{font-size:12px;color:var(--color-text-secondary,#7a6a8a)}
.tdisp{text-align:center;padding:14px 0 4px;font-size:38px;font-weight:600;letter-spacing:.1em;font-variant-numeric:tabular-nums}
.tlbl{text-align:center;font-size:12px;color:var(--color-text-secondary,#7a6a8a);margin-bottom:16px;min-height:18px}
.cat{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e8e0f0);padding:14px 16px;margin-bottom:8px;border-radius:8px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cn{font-size:13px;font-weight:500}
.ct{font-size:14px;font-weight:500;color:var(--pd);font-variant-numeric:tabular-nums}
.gout{height:10px;background:var(--color-background-secondary,#f0eaf8);border-radius:2px;margin-bottom:8px;overflow:hidden;position:relative}
.cf{display:flex;align-items:center;justify-content:space-between}
.cr{font-size:11px;color:var(--color-text-secondary,#7a6a8a)}
.cr.ov{color:var(--r)}
.btns{display:flex;align-items:center;gap:6px}
.bedit{padding:4px 10px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--color-text-secondary,#7a6a8a);font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit}
.bstart{padding:5px 14px;border:0.5px solid var(--p);background:var(--color-background-primary,#fff);color:var(--pd);font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .15s}
.bstart:hover{background:var(--p);color:#fff}
.bstart.run{background:var(--r);border-color:var(--r);color:#fff}
.erow{display:none;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary,#e8e0f0)}
.erow.open{display:flex}
.elbl{font-size:11px;color:var(--color-text-secondary,#7a6a8a);white-space:nowrap}
.eval{font-size:14px;font-weight:500;color:var(--pd);min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
.bpm{padding:5px 12px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-secondary,#f5f0fb);font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;font-family:inherit}
.bpm:hover{border-color:var(--p);color:var(--pd)}
.bsave{padding:5px 12px;border:0.5px solid var(--p);background:var(--p);color:#fff;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;font-family:inherit;margin-left:auto}
.total{background:var(--color-background-secondary,#f5f0fb);border:0.5px solid var(--color-border-tertiary,#e8e0f0);padding:12px 16px;margin-top:4px;border-radius:8px}
.trow{display:flex;align-items:center;justify-content:space-between}
.tlab{font-size:12px;font-weight:500;color:var(--color-text-secondary,#7a6a8a)}
.tval{font-size:15px;font-weight:500;color:var(--pd);font-variant-numeric:tabular-nums}
.thint{font-size:11px;color:var(--lvm);margin-top:4px}
.rnametabs{display:flex;gap:4px;margin-bottom:16px}
.rntab{padding:6px 16px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--color-text-secondary,#7a6a8a);font-family:inherit;font-size:12px;cursor:pointer;border-radius:20px;transition:all .15s}
.rntab.on{background:var(--p);color:#fff;border-color:var(--p)}
.mnav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.mbtn{width:30px;height:30px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--pd);font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.mbtn:hover{background:var(--lv)}
.mlbl{font-size:15px;font-weight:500;min-width:110px;text-align:center}
.sblock{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e8e0f0);padding:14px 16px;border-radius:8px;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.slbl{font-size:12px;color:var(--color-text-secondary,#7a6a8a);white-space:nowrap}
.sinp{flex:1;padding:6px 10px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-secondary,#f5f0fb);font-family:inherit;font-size:13px;font-weight:500;border-radius:6px;text-align:right}
.sunit{font-size:12px;color:var(--color-text-secondary,#7a6a8a)}
.bsalv{padding:5px 12px;border:0.5px solid var(--p);background:var(--color-background-primary,#fff);color:var(--pd);font-family:inherit;font-size:12px;cursor:pointer;border-radius:6px;white-space:nowrap}
.bsalv:hover{background:var(--p);color:#fff}
.sok{font-size:11px;color:#27ae60;min-height:14px;margin-bottom:6px}
.hrow{display:flex;align-items:baseline;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary,#e8e0f0)}
.hlab{font-size:12px;color:var(--color-text-secondary,#7a6a8a)}
.hval{font-size:22px;font-weight:500;color:var(--pd);font-variant-numeric:tabular-nums}
.hsub{font-size:10px;color:var(--color-text-secondary,#7a6a8a);display:block;margin-top:2px}
.agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.acard{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e8e0f0);padding:12px 14px;border-radius:8px}
.albl{font-size:11px;color:var(--color-text-secondary,#7a6a8a);margin-bottom:4px}
.aval{font-size:18px;font-weight:500;color:var(--pd);font-variant-numeric:tabular-nums}
.agoal{font-size:11px;color:var(--lvm);margin-left:6px}
.ctitle{font-size:12px;font-weight:500;color:var(--color-text-secondary,#7a6a8a);margin-bottom:10px}
.bchart{display:flex;align-items:flex-end;gap:3px;height:120px;padding-bottom:24px;position:relative;border-bottom:0.5px solid var(--color-border-tertiary,#e8e0f0)}
.bwrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.bar{width:100%;background:var(--pl);border-radius:2px 2px 0 0;min-height:2px;position:relative}
.bar.cur{background:var(--p)}
.blbl{font-size:9px;color:var(--color-text-secondary,#7a6a8a);position:absolute;bottom:-20px;white-space:nowrap;left:50%;transform:translateX(-50%)}
.bval{font-size:9px;color:var(--color-text-secondary,#7a6a8a);position:absolute;top:-14px;white-space:nowrap;left:50%;transform:translateX(-50%)}
.avgl{position:absolute;left:0;right:0;border-top:1.5px dashed var(--lvm);pointer-events:none}
.avgll{position:absolute;right:0;font-size:9px;color:var(--p);transform:translateY(-12px);background:var(--cream);padding:0 2px}
.iorow{display:flex;gap:8px;margin-top:28px;justify-content:center}
.bio{padding:7px 18px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);color:var(--color-text-secondary,#7a6a8a);font-family:inherit;font-size:12px;cursor:pointer;border-radius:6px}
.bio:hover{border-color:var(--p);color:var(--pd)}
.tknrow{display:flex;gap:8px;margin-top:10px;justify-content:center;align-items:center}
.tkninp{flex:1;max-width:280px;padding:6px 10px;border:0.5px solid var(--color-border-tertiary,#e8e0f0);background:var(--color-background-primary,#fff);font-family:inherit;font-size:12px;border-radius:6px}
.tkninp:focus{outline:none;border-color:var(--p)}
.tknst{text-align:center;font-size:11px;color:var(--color-text-secondary,#7a6a8a);margin-top:4px;min-height:14px}
.volrow{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:20px}
.vollbl{font-size:11px;color:var(--color-text-secondary,#7a6a8a)}
</style>
</head>
<body>
<div class="wrap">
  <div class="mtabs">
    <button class="mt on" onclick="switchMain('sumire',this)">すみれ</button>
    <button class="mt" onclick="switchMain('murasaki',this)">MURASAKI</button>
    <button class="mt" onclick="switchMain('review',this)">振り返り</button>
  </div>

  <div id="panel-timer">
    <div class="prow">
      <div class="ptabs">
        <button class="pt on" onclick="switchPeriod('week',this)">今週</button>
        <button class="pt" onclick="switchPeriod('month',this)">今月</button>
      </div>
      <div class="dlbl" id="dlbl"></div>
    </div>
    <div class="tdisp" id="tdisp">00:00:00</div>
    <div class="tlbl" id="tlbl">カテゴリを選んでスタート</div>
    <div id="cats"></div>
    <div class="total">
      <div class="trow">
        <span class="tlab">合計作業時間</span>
        <span class="tval" id="tval">—</span>
      </div>
      <div class="thint" id="thint"></div>
    </div>
  </div>

  <div id="panel-review" style="display:none">
    <div class="rnametabs">
      <button class="rntab on" onclick="switchReview('sumire',this)">すみれ</button>
      <button class="rntab" onclick="switchReview('murasaki',this)">MURASAKI</button>
    </div>
    <div class="mnav">
      <button class="mbtn" onclick="changeMonth(-1)">&#8249;</button>
      <span class="mlbl" id="mlbl"></span>
      <button class="mbtn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="sblock">
      <div class="srow">
        <span class="slbl">売上</span>
        <input class="sinp" type="number" id="sinp" placeholder="0">
        <span class="sunit">円</span>
        <button class="bsalv" onclick="saveSalary()">保存</button>
      </div>
      <div class="sok" id="sok"></div>
      <div class="hrow">
        <span class="hlab">時給</span>
        <div style="text-align:right">
          <span class="hval" id="hval">—</span>
          <span class="hsub" id="hsub">売上を入力して保存してください</span>
        </div>
      </div>
    </div>
    <div class="agrid" id="agrid"></div>
    <div class="ctitle">月別作業時間（過去12ヶ月）</div>
    <div class="bchart" id="bchart"></div>
  </div>

  <div class="iorow">
    <button class="bio" onclick="exportData()">↓ エクスポート</button>
    <label class="bio" style="cursor:pointer">↑ インポート<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
  </div>
  <div class="tknrow">
    <input class="tkninp" type="password" id="tkninp" placeholder="GitHub Token を入力して保存">
    <button class="bio" onclick="saveToken()">保存</button>
  </div>
  <div class="tknst" id="tknst"></div>
  <div class="volrow">
    <span class="vollbl">🔔 アラーム音量</span>
    <input type="range" min="0" max="1" step="0.1" value="0.5" id="volsl" style="width:110px;accent-color:var(--p)">
    <span class="vollbl" id="volvl">50%</span>
  </div>
</div>

<script>
const SEG=180;
const PC=['#d4c4e8','#b89fd4','#9b7ec8','#7a4faa'];
const LC=['#ede8f7','#ddd5f0','#cdc2e8','#b89fd4'];
const GIST_ID='ecc631192073225c3d74bc0e35702b0f';
const SKEY='sumire_timer_v3';
const now=new Date();

const DEFS={
  sumire:{
    cats:[
      {name:'作曲①',wgoal:180,mgoal:180,pal:'p'},
      {name:'作曲②',wgoal:180,mgoal:180,pal:'l'},
      {name:'事務',wgoal:120,mgoal:480,pal:'p'},
      {name:'新企画準備',wgoal:150,mgoal:600,pal:'l'},
    ],
    wtg:570,mtg:1320,
    whint:'今週の目安：5〜5.5h',mhint:'月目標：22h以内'
  },
  murasaki:{
    cats:[
      {name:'作曲',wgoal:720,mgoal:2880,segs:SEG,pal:'p'},
      {name:'事務',wgoal:720,mgoal:2880,segs:SEG,pal:'p'},
    ],
    wtg:1440,mtg:5760,
    whint:'今週の目安：作曲3h＋事務3h',mhint:'月目標：各48h'
  }
};

function defaultState(){
  const s={sumire:{},murasaki:{},running:null};
  const y=now.getFullYear(),m=now.getMonth()+1;
  const wkey=weekKey();
  for(const tab of['sumire','murasaki']){
    s[tab][wkey]={};
    DEFS[tab].cats.forEach(c=>{s[tab][wkey][c.name]=0;});
    s[tab].month={};
    DEFS[tab].cats.forEach(c=>{s[tab].month[c.name]=0;});
  }
  return s;
}

function weekKey(){
  const d=new Date();
  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const mon=new Date(d.setDate(diff));
  return`w${mon.getFullYear()}${String(mon.getMonth()+1).padStart(2,'0')}${String(mon.getDate()).padStart(2,'0')}`;
}

function ensureWeek(s){
  const wk=weekKey();
  for(const tab of['sumire','murasaki']){
    if(!s[tab][wk]){
      s[tab][wk]={};
      DEFS[tab].cats.forEach(c=>{s[tab][wk][c.name]=0;});
    }
    if(!s[tab].month){
      s[tab].month={};
      DEFS[tab].cats.forEach(c=>{s[tab].month[c.name]=0;});
    }
  }
  return s;
}

function loadState(){
  try{const s=localStorage.getItem(SKEY);if(s)return ensureWeek(JSON.parse(s));}catch(e){}
  return defaultState();
}

let state=loadState();
let curTab='sumire',curPeriod='week',curReview='sumire';
let dispInt=null;
let reviewYear=now.getFullYear(),reviewMonth=now.getMonth()+1;
let editVals={};

function getWk(){return weekKey();}

function getDone(tab,cat){
  const wk=getWk();
  if(curPeriod==='week') return(state[tab][wk]&&state[tab][wk][cat])||0;
  return(state[tab].month&&state[tab].month[cat])||0;
}

function getGoal(tab,cat){
  const def=DEFS[tab].cats.find(c=>c.name===cat);
  return curPeriod==='week'?def.wgoal:def.mgoal;
}

function getLiveDone(tab,cat){
  const base=getDone(tab,cat);
  if(state.running&&state.running.tab===tab&&state.running.cat===cat){
    return base+Math.floor(getElapsed()/60);
  }
  return base;
}

function getElapsed(){
  if(!state.running)return 0;
  return Math.floor((Date.now()-state.running.startMs)/1000);
}

function fmtM(m){const h=Math.floor(m/60),mm=m%60;return h>0?`${h}h ${String(mm).padStart(2,'0')}m`:`${mm}m`;}
function fmtS(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}

function gauge(done,goal,segs,pal){
  const C=pal==='l'?LC:PC;
  const over=done>goal,maxD=over?done:goal;
  if(!segs){
    const np=Math.min(Math.round(done/maxD*100),100);
    const op=over?Math.round((done-goal)/maxD*100):0;
    return`<div class="gout"><div style="position:absolute;top:0;left:0;height:100%;display:flex;width:100%"><div style="width:${np}%;height:100%;background:${C[2]};flex-shrink:0"></div><div style="width:${op}%;height:100%;background:#c0392b;flex-shrink:0"></div></div></div>`;
  }
  const ns=Math.ceil(goal/segs);
  let rem=Math.min(done,goal),html='<div class="gout"><div style="position:absolute;top:0;left:0;height:100%;display:flex;width:100%">';
  for(let i=0;i<ns;i++){
    const sg=Math.min(segs,goal-i*segs),sd=Math.max(0,Math.min(rem,sg));
    rem-=sd;
    const pp=Math.round(sd/sg*100),sw=Math.round(sg/goal*100);
    html+=`<div style="width:${sw}%;height:100%;background:#e8e0f0;flex-shrink:0;${i>0?'border-left:2px solid #faf8f5':''}"><div style="width:${pp}%;height:100%;background:${C[Math.min(i,C.length-1)]}"></div></div>`;
  }
  if(over){const op=Math.round((done-goal)/maxD*100);html+=`<div style="width:${op}%;height:100%;background:#c0392b;flex-shrink:0"></div>`;}
  return html+'</div></div>';
}

function render(){
  const def=DEFS[curTab];
  const showStart=true;
  let td=0;
  document.getElementById('cats').innerHTML=def.cats.map((c,i)=>{
    const done=getLiveDone(curTab,c.name);
    const goal=curPeriod==='week'?c.wgoal:c.mgoal;
    td+=done;
    const over=done>goal;
    const isR=state.running&&state.running.tab===curTab&&state.running.cat===c.name;
    const ev=editVals[c.name]!==undefined?editVals[c.name]:done;
    const showBtn=curPeriod==='week';
    return`<div class="cat">
      <div class="ch"><span class="cn">${c.name}</span><span class="ct">${fmtM(done)} / ${fmtM(goal)}</span></div>
      ${gauge(done,goal,c.segs||null,c.pal)}
      <div class="cf">
        <span class="cr${over?' ov':''}">${over?'超過 '+fmtM(done-goal):'残り '+fmtM(goal-done)}</span>
        <div class="btns">
          <button class="bedit" onclick="toggleEdit('${c.name}',${done})">修正</button>
          ${showBtn?`<button class="bstart${isR?' run':''}" onclick="toggleTimer('${c.name}')">${isR?'■ 停止':'▶ スタート'}</button>`:''}
        </div>
      </div>
      <div class="erow" id="er-${c.name}">
        <span class="elbl">修正</span>
        <button class="bpm" onclick="adjEdit('${c.name}',-5)">－5分</button>
        <span class="eval" id="ev-${c.name}">${ev}分</span>
        <button class="bpm" onclick="adjEdit('${c.name}',5)">＋5分</button>
        <button class="bsave" onclick="saveEdit('${c.name}')">保存</button>
      </div>
    </div>`;
  }).join('');
  const tg=curPeriod==='week'?def.wtg:def.mtg;
  document.getElementById('tval').textContent=`${fmtM(td)} / ${fmtM(tg)}`;
  document.getElementById('thint').textContent=curPeriod==='week'?def.whint:def.mhint;
}

function toggleEdit(name,done){
  editVals[name]=done;
  const er=document.getElementById(`er-${name}`);
  er.classList.toggle('open');
  document.getElementById(`ev-${name}`).textContent=done+'分';
}

function adjEdit(name,d){
  editVals[name]=Math.max(0,(editVals[name]||0)+d);
  document.getElementById(`ev-${name}`).textContent=editVals[name]+'分';
}

function saveEdit(name){
  const val=editVals[name]||0;
  const wk=getWk();
  state[curTab][wk][name]=val;
  state[curTab].month[name]=val;
  delete editVals[name];
  document.getElementById(`er-${name}`).classList.remove('open');
  saveState();
  render();
}

function stopCurrent(){
  if(!state.running)return;
  const el=getElapsed();
  const r=state.running;
  const mins=Math.floor(el/60);
  const wk=getWk();
  state[r.tab][wk][r.cat]=(state[r.tab][wk][r.cat]||0)+mins;
  state[r.tab].month[r.cat]=(state[r.tab].month[r.cat]||0)+mins;
  state.running=null;
}

function toggleTimer(name){
  const isR=state.running&&state.running.tab===curTab&&state.running.cat===name;
  if(isR){
    stopCurrent();
    saveState();
    if(dispInt){clearInterval(dispInt);dispInt=null;}
    document.getElementById('tdisp').textContent='00:00:00';
    document.getElementById('tlbl').textContent='カテゴリを選んでスタート';
  } else {
    stopCurrent();
    state.running={tab:curTab,cat:name,startMs:Date.now()};
    saveState();
    document.getElementById('tlbl').textContent=name+' を計測中';
    startDisp();
  }
  render();
}

function startDisp(){
  if(dispInt)clearInterval(dispInt);
  dispInt=setInterval(()=>{
    if(!state.running)return;
    const el=getElapsed();
    document.getElementById('tdisp').textContent=fmtS(el);
    if(el===3600)playAlarm();
    if(el%60===0&&el>0){saveState();render();}
  },1000);
}

function switchMain(tab,btn){
  document.querySelectorAll('.mt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(tab==='review'){
    document.getElementById('panel-timer').style.display='none';
    document.getElementById('panel-review').style.display='block';
    renderReview();return;
  }
  document.getElementById('panel-timer').style.display='block';
  document.getElementById('panel-review').style.display='none';
  curTab=tab;render();
}

function switchPeriod(p,btn){
  curPeriod=p;
  document.querySelectorAll('.pt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  editVals={};
  render();
}

function switchReview(name,btn){
  curReview=name;
  document.querySelectorAll('.rntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderReview();
}

function rvKey(tab,y,m){return`rv_${tab}_${y}_${String(m).padStart(2,'0')}`;}

function changeMonth(d){
  reviewMonth+=d;
  if(reviewMonth>12){reviewMonth=1;reviewYear++;}
  if(reviewMonth<1){reviewMonth=12;reviewYear--;}
  renderReview();
}

function saveSalary(){
  const sal=parseInt(document.getElementById('sinp').value)||0;
  const key=rvKey(curReview,reviewYear,reviewMonth);
  const saved=JSON.parse(localStorage.getItem(key)||'{}');
  saved.salary=sal;
  const isNow=(reviewYear===now.getFullYear()&&reviewMonth===now.getMonth()+1);
  if(isNow){
    saved.totalMins=DEFS[curReview].cats.reduce((a,c)=>a+(state[curReview].month[c.name]||0),0);
  }
  localStorage.setItem(key,JSON.stringify(saved));
  document.getElementById('sok').textContent='✓ 保存しました';
  setTimeout(()=>{document.getElementById('sok').textContent='';},2000);
  calcHourly();
}

function calcHourly(){
  const key=rvKey(curReview,reviewYear,reviewMonth);
  const saved=JSON.parse(localStorage.getItem(key)||'{}');
  const sal=saved.salary||0;
  document.getElementById('sinp').value=sal||'';
  const isNow=(reviewYear===now.getFullYear()&&reviewMonth===now.getMonth()+1);
  const totalMins=isNow?DEFS[curReview].cats.reduce((a,c)=>a+(state[curReview].month[c.name]||0),0):(saved.totalMins||0);
  const totalH=Math.round(totalMins/60*10)/10;
  if(sal>0&&totalH>0){
    const hw=Math.round(sal/totalH);
    document.getElementById('hval').textContent=`¥${hw.toLocaleString()}`;
    document.getElementById('hsub').textContent=`¥${sal.toLocaleString()} ÷ ${totalH}h`;
  } else {
    document.getElementById('hval').textContent='—';
    document.getElementById('hsub').textContent=totalH>0?`${totalH}h記録済・売上を入力して保存`:'売上を入力して保存してください';
  }
}

function renderReview(){
  document.getElementById('mlbl').textContent=`${reviewYear}年${reviewMonth}月`;
  calcHourly();
  const def=DEFS[curReview];
  const isNow=(reviewYear===now.getFullYear()&&reviewMonth===now.getMonth()+1);
  const saved=JSON.parse(localStorage.getItem(rvKey(curReview,reviewYear,reviewMonth))||'{}');
  const totalMins=isNow?def.cats.reduce((a,c)=>a+(state[curReview].month[c.name]||0),0):(saved.totalMins||0);
  const totalH=Math.round(totalMins/60*10)/10;
  const mgoal=def.mtg/60;
  document.getElementById('agrid').innerHTML=
    `<div class="acard"><div class="albl">${reviewYear}年${reviewMonth}月 合計</div><div><span class="aval">${totalH}h</span><span class="agoal">目標 ${mgoal}h</span></div></div>`+
    def.cats.map(c=>{
      const m=isNow?(state[curReview].month[c.name]||0):(saved.cats&&saved.cats[c.name]||0);
      return`<div class="acard"><div class="albl">${c.name}</div><div><span class="aval">${Math.round(m/60*10)/10}h</span></div></div>`;
    }).join('');
  const months=[],hours=[];
  for(let i=11;i>=0;i--){
    let y=now.getFullYear(),mo=now.getMonth()+1-i;
    while(mo<1){mo+=12;y--;}
    const lbl=i===0?'今月':`${mo}月`;
    months.push(lbl);
    const isC=(y===now.getFullYear()&&mo===now.getMonth()+1);
    const h=isC?Math.round(def.cats.reduce((a,c)=>a+(state[curReview].month[c.name]||0),0)/60*10)/10
      :(JSON.parse(localStorage.getItem(rvKey(curReview,y,mo))||'{}').totalMins||0)/60;
    hours.push(Math.round(h*10)/10);
  }
  const max=Math.max(...hours,mgoal,1);
  const valid=hours.filter(h=>h>0);
  const avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length*10)/10:0;
  const ap=Math.round(avg/max*90);
  document.getElementById('bchart').innerHTML=
    `<div class="avgl" style="bottom:${ap}%"><span class="avgll">平均 ${avg}h</span></div>`+
    months.map((m,i)=>{
      const h=hours[i],p=h?Math.round(h/max*90):0,isc=m==='今月';
      return`<div class="bwrap"><div class="bar${isc?' cur':''}" style="height:${p}%">${h?`<span class="bval">${h}h</span>`:''}<span class="blbl">${m}</span></div></div>`;
    }).join('');
}

function saveState(){
  localStorage.setItem(SKEY,JSON.stringify(state));
  saveToGist();
}

let GIST_TOKEN=localStorage.getItem('gist_token')||'';

async function loadFromGist(){
  GIST_TOKEN=localStorage.getItem('gist_token')||'';
  if(!GIST_TOKEN||!GIST_ID)return;
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`,{
      headers:{'Authorization':'token '+GIST_TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    const data=await res.json();
    const content=data.files['timer_data.json']?.content;
    if(content){
      const remote=JSON.parse(content);
      if(remote&&remote.sumire&&remote.murasaki){
        state=ensureWeek(remote);
        localStorage.setItem(SKEY,JSON.stringify(state));
      } else {await saveToGist();}
    } else {await saveToGist();}
  }catch(e){console.log('Gist load:',e);}
}

async function saveToGist(){
  GIST_TOKEN=localStorage.getItem('gist_token')||'';
  if(!GIST_TOKEN||!GIST_ID)return;
  try{
    await fetch(`https://api.github.com/gists/${GIST_ID}`,{
      method:'PATCH',
      headers:{'Authorization':'token '+GIST_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{'timer_data.json':{content:JSON.stringify(state)}}})
    });
  }catch(e){console.log('Gist save:',e);}
}

function saveToken(){
  const t=document.getElementById('tkninp').value.trim();
  if(t){
    localStorage.setItem('gist_token',t);
    GIST_TOKEN=t;
    document.getElementById('tknst').textContent='✓ 保存しました';
    document.getElementById('tkninp').value='';
    document.getElementById('tkninp').placeholder='トークン設定済み';
    setTimeout(()=>{document.getElementById('tknst').textContent='';},2000);
  }
}

function exportData(){
  const data={state,reviews:{}};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('rv_'))data.reviews[k]=JSON.parse(localStorage.getItem(k));
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`timer_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(a.href);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.state){state=ensureWeek(data.state);saveState();}
      if(data.reviews){Object.entries(data.reviews).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));}
      alert('インポートしました');render();
    }catch(err){alert('ファイルの形式が正しくありません');}
  };
  reader.readAsText(file);e.target.value='';
}

const ALARM_SRC='./ORBIT_FX_Mow.wav';
function playAlarm(){
  const vol=parseFloat(document.getElementById('volsl').value);
  const audio=new Audio(ALARM_SRC);
  audio.volume=vol;
  audio.play().catch(e=>console.log('Audio:',e));
}
document.getElementById('volsl').addEventListener('input',function(){
  document.getElementById('volvl').textContent=Math.round(this.value*100)+'%';
});

function setDate(){
  const n=new Date(),d=['日','月','火','水','木','金','土'];
  document.getElementById('dlbl').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${d[n.getDay()]}）`;
}

if(localStorage.getItem('gist_token')){
  document.getElementById('tkninp').placeholder='トークン設定済み';
}

async function init(){
  await loadFromGist();
  if(state.running){
    document.getElementById('tlbl').textContent=state.running.cat+' を計測中';
    startDisp();
  }
  setDate();render();
}
init();
</script>
